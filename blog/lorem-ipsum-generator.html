<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>



<script>

    (function () {

        const LOREM_WORDS = (
            "lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum"
        ).split(/\s+/);

        const paragraphsInput = document.getElementById('paragraphs');
        const wordsInput = document.getElementById('words');
        const output = document.getElementById('output');
        const btnGenerate = document.getElementById('generate');
        const btnCopy = document.getElementById('copy');
        const btnDownload = document.getElementById('download');
        const btnClear = document.getElementById('clear');

        // Utility functions
        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function pick() { return LOREM_WORDS[randInt(0, LOREM_WORDS.length - 1)]; }
        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        // Generate one paragraph of approximately `count` words, broken into sentences.
        function genParagraph(count) {
            const words = [];
            while (words.length < count) {
                words.push(pick());
            }

            // Build sentences: split words into sentences of random length (6-18)
            const sentences = [];
            let i = 0;
            while (i < words.length) {
                const rem = words.length - i;
                const sentenceLen = Math.min(rem, randInt(6, 18));
                const slice = words.slice(i, i + sentenceLen);
                let sentence = slice.join(' ');
                sentence = capitalize(sentence) + '.';
                sentences.push(sentence);
                i += sentenceLen;
            }
            return sentences.join(' ');
        }

        function generate() {
            const p = Math.max(1, Math.min(100, parseInt(paragraphsInput.value) || 1));
            const w = Math.max(1, Math.min(5000, parseInt(wordsInput.value) || 60));
            const paras = [];
            for (let i = 0; i < p; i++) {
                paras.push(genParagraph(w));
            }
            const result = paras.join("\n\n");
            output.textContent = result;
            return result;
        }

        btnGenerate.addEventListener('click', generate);

        btnCopy.addEventListener('click', async () => {
            try {
                const text = output.textContent || generate();
                await navigator.clipboard.writeText(text);
                btnCopy.textContent = 'Copied';
                setTimeout(() => btnCopy.textContent = 'Copy', 1200);
            } catch (e) {
                alert('Copy failed: ' + (e && e.message ? e.message : e));
            }
        });

        // Create a blob and download it as a text file
        btnDownload.addEventListener('click', () => {
            const text = output.textContent || generate();
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lorem-ipsum.txt';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });

        btnClear.addEventListener('click', () => { output.textContent = ''; });

        // Generate default on load
        window.addEventListener('DOMContentLoaded', generate);
    })();</script>

<script src="../js/script.js"></script>
